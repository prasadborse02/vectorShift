services:
  - type: web
    name: vectorshift-pipeline
    runtime: python
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
      - key: PYTHON_VERSION
        value: 3.11.0
    plan: free
